name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - run: dotnet format src --verify-no-changes

  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - run: dotnet build src -c Release -warnaserror

  build:
    name: Build
    runs-on: windows-latest
    needs: [format, lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - uses: go-task/setup-task@v2
      - run: task publish
      - uses: actions/upload-artifact@v4
        with:
          name: WslForward
          path: publish/WslForward.exe
